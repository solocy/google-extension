<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="button.css">
  </head>
  <body>
    <div class="container">
        <div class="header">
            <span class="title">QR Code Scanner</span>
        </div>
        <div id="qrcode-list">
            <div id="loading">
                <div class="spinner"></div>
                <span>Scanning...</span>
            </div>
        </div>
        <div id="result-section" style="display: none;">
            <div class="result-label">Result:</div>
            <div class="input-wrapper">
                <input id="input" readonly/>
                <button class="copy-btn" id="copy">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div id="no-qrcode" style="display: none;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
            </svg>
            <span>No QR code found</span>
        </div>
    </div>

    <script src="popup.js" type="text/javascript" charset="UTF-8"></script>
  </body>
</html>
