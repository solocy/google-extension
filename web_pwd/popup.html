<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebPwd</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="app-header">
      <span class="logo">🔐</span>
      <h2>WebPwd</h2>
    </div>
    <div id="controls">
      <button id="btn-new-folder">📁 新建</button>
      <label><input type="checkbox" id="auto-fill"> 自动填充</label>
    </div>
    <!-- 新建文件夹输入区 -->
    <div id="new-folder-form" class="new-folder-form" style="display: none;">
      <input type="text" id="new-folder-input" placeholder="输入文件夹名称..." maxlength="20">
      <button id="btn-confirm-folder" class="btn-confirm">✓</button>
      <button id="btn-cancel-folder" class="btn-cancel">✕</button>
    </div>
    <div id="folders"></div>
    <div id="credentials"></div>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
