<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>保存登录信息</title>
  <link rel="stylesheet" href="save_prompt.css">
</head>
<body>
  <div class="save-prompt">
    <div class="prompt-header">
      <div>
        <div class="eyebrow">WebPwd</div>
        <h1>保存登录信息？</h1>
      </div>
      <div id="countdown" class="countdown">5.0s</div>
    </div>

    <div id="prompt-body" class="prompt-body">
      <div class="meta-row">
        <span class="meta-label">网站</span>
        <span id="site-title" class="meta-value"></span>
      </div>
      <div class="meta-row">
        <span class="meta-label">用户名</span>
        <span id="username" class="meta-value"></span>
      </div>

      <div id="conflict-tip" class="conflict-tip hidden">
        当前账号已存在，保存后会覆盖为新的密码记录。
      </div>

      <label class="field-label" for="folder-select">保存到文件夹</label>
      <select id="folder-select" class="field-control"></select>

      <label class="field-label" for="title-input">标题</label>
      <input id="title-input" class="field-control" type="text" maxlength="120" placeholder="输入标题" />
    </div>

    <div id="status" class="status hidden"></div>

    <div class="prompt-actions">
      <button id="ignore-btn" class="btn btn-secondary" type="button">忽略</button>
      <button id="save-btn" class="btn btn-primary" type="button">保存</button>
    </div>
  </div>

  <script src="save_prompt.js"></script>
</body>
</html>
